<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Humane</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            background: var(--bg-2);
            position: relative;
        }

        .auth-page::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=1200&q=50') center/cover;
            opacity: 0.15;
            filter: grayscale(1) brightness(0.8);
        }

        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 4rem 3.5rem;
            width: 100%;
            max-width: 460px;
            box-shadow: var(--shadow-lg);
            position: relative;
            z-index: 1;
            animation: scaleIn 0.5s ease;
        }

        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            margin-bottom: 3.5rem;
            white-space: nowrap;
        }

        .logo-mark {
            background: #FF1919;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .form-control {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 1rem;
            width: 100%;
            padding: 1.25rem;
            border-radius: 12px;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: #FF1919;
            outline: none;
            box-shadow: 0 0 15px rgba(255, 25, 25, 0.2);
        }

        .btn-primary {
            background: #FF1919;
            color: #fff;
            width: 100%;
            justify-content: center;
            padding: 1.25rem;
            font-size: 1.1rem;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            margin-top: 2.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background: #ff4d4d;
            transform: translateY(-3px);
        }

        .auth-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            gap: 0.4rem;
            cursor: pointer;
        }

        .remember-option {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.78rem;
            line-height: 1;
        }

        .remember-option span {
            white-space: nowrap;
        }

        .forgot-link {
            color: #FF1919;
            font-weight: 700;
            text-decoration: none;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            font-size: 0.78rem;
            line-height: 1;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .auth-switch {
            margin-top: 3rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .auth-switch a {
            color: #FF1919;
            font-weight: 700;
            text-decoration: none;
        }

        .auth-switch a:hover {
            text-decoration: underline;
        }

        /* Social Auth Styles */
        .social-auth {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .social-header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
            margin-top: 1.5rem;
        }

        .social-header::before,
        .social-header::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .social-header span {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 700;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 1.1rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            font-size: 0.95rem;
        }

        .social-btn:hover {
            border-color: #FF1919;
            background: var(--bg-card);
            transform: translateY(-2px);
        }

        .social-btn svg {
            width: 20px;
            height: 20px;
        }

        @media (max-width: 900px) {
            .auth-controls-mobile-fix {
                position: absolute !important;
                top: 1rem !important;
                left: 1rem !important;
                right: auto !important;
                z-index: 2 !important;
            }
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.9);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect width='24' height='24' rx='4' fill='%23FF1919'/><path d='M12 2L8 8H4l4 4-2 8 6-4 6 4-2-8 4-4h-4L12 2z' fill='white'/></svg>" />
</head>

<body class="auth-page">
    <div class="auth-controls auth-controls-mobile-fix"
        style="position:fixed; top:2rem; right:2rem; z-index:100; display:flex; gap:1rem;">
        <button class="icon-btn" data-theme-toggle title="Theme"
            style="width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:var(--bg-card);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:0.3s;"><svg
                viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" width="20" height="20">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg></button>
        <button class="icon-btn" data-rtl-toggle title="RTL"
            style="width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:var(--bg-card);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:0.3s;"><svg
                viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" width="20" height="20">
                <path d="M21 10H7M21 6H7M21 14H3M21 18H3" />
            </svg></button>
    </div>

    <div class="auth-card">
        <a href="index.html" class="auth-logo"><span class="logo-mark"><svg viewBox="0 0 24 24">
                    <path d="M12 2L8 8H4l4 4-2 8 6-4 6 4-2-8 4-4h-4L12 2z" />
                </svg></span>Humane</a>
        <h2 style="color:var(--text);margin-bottom:1rem;text-align:center;">Dispatch Login</h2>
        <p style="color:var(--text-muted);text-align:center;margin-bottom:3rem;font-size:0.9rem;">Establish secure
            connection to Command Center.</p>
        <form id="loginForm">
            <div class="form-group"><label>Station Identity (Email)</label><input type="email" class="form-control"
                    name="email" placeholder="" required /></div>
            <div class="form-group"><label>Security Core (Password)</label><input type="password" class="form-control"
                    name="password" placeholder="" required /></div>
            <div class="auth-options">
                <label class="remember-option"><input type="checkbox" name="remember" /> <span>Remember
                        me</span></label>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>
            <button type="submit" class="btn-primary" style="margin-bottom: 2.5rem;">Initiate Connection 📡</button>
        </form>

        <div class="social-header">
            <span>External Protocol</span>
        </div>

        <div class="social-auth">
            <button class="social-btn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                        fill="#4285F4" />
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.26 1.07-3.71 1.07-2.87 0-5.3-1.94-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        fill="#34A853" />
                    <path
                        d="M5.84 14.11c-.22-.66-.35-1.36-.35-2.11s.13-1.45.35-2.11V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.83z"
                        fill="#FBBC05" />
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.63l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.83c.86-2.59 3.3-4.52 6.16-4.52z"
                        fill="#EA4335" />
                </svg>
                Sign with Google
            </button>
            <button class="social-btn">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M17.05 20.28c-.96.95-2.02 1.48-3.13 1.48-1.07 0-1.89-.35-2.43-.63-.5-.26-.95-.49-1.5-.49-.55 0-1.03.24-1.53.5-.55.29-1.39.66-2.48.66-1.12 0-2.22-.53-3.23-1.52C1.1 18.66 1 15.34 3.01 13.01c1.1-1.28 2.45-1.98 3.84-1.98.66 0 1.25.18 1.83.47.46.22.86.43 1.28.43.38 0 .8-.22 1.28-.46.52-.25 1.1-.53 1.95-.53 1.05 0 2.05.35 2.86.99-.48.42-.87 1.08-.87 2.04 0 .93.53 1.76 1.45 2.37-.28.84-.71 1.64-1.18 2.34-.14.19-.28.39-.4.6zm-4.71-12.2c0-.57.17-1.14.51-1.64.67-.99 1.88-1.55 3.02-1.55.03.49-.12 1.02-.38 1.48-.63.92-1.85 1.73-3.1 1.73-.03-.02-.05-.01-.05-.02z" />
                </svg>
                Sign with Apple
            </button>
        </div>

        <div class="auth-switch">No signal? <a href="register.html">Request New Station</a></div>
    </div>
    <button class="scroll-top" id="scrollTop"><svg viewBox="0 0 24 24">
            <polyline points="18 15 12 9 6 15" />
        </svg></button>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const btn = this.querySelector('button'); btn.textContent = 'CONNECTING TO CORE...'; btn.disabled = true;
            setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
        });
    </script>
    <script src="js/main.js"></script>
</body>

</html>
